<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基本情報 過去問道場 Clone</title>
    <!-- スタイリングのための Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React本体 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- ブラウザでReactのコードを動かすためのBabel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans min-h-screen p-4">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- アイコン部品（インラインSVG） ---
        const IconCheckCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const IconXCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>;
        const IconAlertCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
        const IconArrowRight = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
        const IconRotateCcw = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>;
        const IconPlay = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const IconBookOpen = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;
        const IconHome = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
        const IconAward = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>;

        // --- モックデータ（基本情報技術者試験風の過去問） ---
        const ALL_QUESTIONS = [
            {
                id: 1, category: "コンピュータ構成要素", answerIndex: 2,
                text: "SRAMの特徴として、適切なものはどれか。",
                options: ["リフレッシュ動作が必要である。", "DRAMと比べてアクセス速度が遅い。", "フリップフロップ回路で構成される。", "電源を切っても記憶内容が保持される。"],
                explanation: "SRAM（Static RAM）はフリップフロップ回路を用いて記憶するため、DRAMのようなリフレッシュ（記憶保持のための再書き込み）動作が不要で、高速に動作します。キャッシュメモリなどに用いられます。"
            },
            {
                id: 2, category: "ネットワーク", answerIndex: 2,
                text: "OSI基本参照モデルにおいて、エンドツーエンドの通信の信頼性を確保する層はどれか。",
                options: ["データリンク層", "ネットワーク層", "トランスポート層", "セッション層"],
                explanation: "トランスポート層（第4層）は、エラー検出や再送制御を行い、送信元から宛先までの通信（エンドツーエンド）の信頼性を確保します。代表的なプロトコルにTCPがあります。"
            },
            {
                id: 3, category: "セキュリティ", answerIndex: 2,
                text: "公開鍵暗号方式において、AさんからBさんへ秘匿性の高いメッセージを送る場合、暗号化に使用する鍵はどれか。",
                options: ["Aさんの公開鍵", "Aさんの秘密鍵", "Bさんの公開鍵", "Bさんの秘密鍵"],
                explanation: "公開鍵暗号方式で他人に内容を知られないよう（秘匿性）暗号化して送る場合、受信者（Bさん）の公開鍵で暗号化します。これにより、復号できるのはペアとなる秘密鍵を持つBさん本人のみとなります。"
            },
            {
                id: 4, category: "データベース", answerIndex: 3,
                text: "データベースのトランザクション処理に求められるACID特性のうち、トランザクションが正常に完了したとき、その結果はシステムに障害が発生しても失われないという特性はどれか。",
                options: ["原子性 (Atomicity)", "一貫性 (Consistency)", "独立性 (Isolation)", "耐久性 (Durability)"],
                explanation: "耐久性（Durability）は、コミットされたトランザクションの結果が、その後のシステム障害などに関わらず永続的に保存される特性のことです。"
            },
            {
                id: 5, category: "ソフトウェア開発", answerIndex: 1,
                text: "アジャイル開発の手法の一つであるスクラムにおいて、開発チームが毎日の進捗や問題点を共有するための短いミーティングを何と呼ぶか。",
                options: ["スプリントプランニング", "デイリースクラム", "スプリントレビュー", "レトロスペクティブ"],
                explanation: "デイリースクラムは、チームメンバーが毎日決まった時間に集まり、昨日やったこと、今日やること、障害となっていることを共有する短い（通常15分以内）ミーティングです。"
            }
        ];

        // --- アプリケーション本体 ---
        function App() {
            const [appState, setAppState] = useState('home');
            const [playMode, setPlayMode] = useState('all');
            const [currentIndex, setCurrentIndex] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [isAnswered, setIsAnswered] = useState(false);
            const [correctCount, setCorrectCount] = useState(0);

            // 間違えた問題の保存と読み込み
            const [wrongIds, setWrongIds] = useState(() => {
                try {
                    const saved = localStorage.getItem('fe_dojo_wrong_ids_local');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) { return []; }
            });

            useEffect(() => {
                try { localStorage.setItem('fe_dojo_wrong_ids_local', JSON.stringify(wrongIds)); } 
                catch (e) {}
            }, [wrongIds]);

            const activeQuestions = useMemo(() => {
                return playMode === 'all' ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q => wrongIds.includes(q.id));
            }, [playMode, wrongIds]);

            const currentQuestion = activeQuestions[currentIndex];

            const startQuiz = (mode) => {
                setPlayMode(mode); setCurrentIndex(0); setCorrectCount(0);
                setSelectedOption(null); setIsAnswered(false); setAppState('playing');
            };

            const submitAnswer = () => {
                if (selectedOption === null || isAnswered) return;
                setIsAnswered(true);
                const isCorrect = selectedOption === currentQuestion.answerIndex;

                if (isCorrect) {
                    setCorrectCount(prev => prev + 1);
                    if (playMode === 'review') setWrongIds(prev => prev.filter(id => id !== currentQuestion.id));
                } else {
                    if (!wrongIds.includes(currentQuestion.id)) setWrongIds(prev => [...prev, currentQuestion.id]);
                }
            };

            const nextQuestion = () => {
                if (currentIndex < activeQuestions.length - 1) {
                    setCurrentIndex(prev => prev + 1); setSelectedOption(null); setIsAnswered(false);
                } else {
                    setAppState('result');
                }
            };

            const HomeView = () => (
                <div className="max-w-2xl mx-auto mt-10 p-6 bg-white rounded-2xl shadow-lg text-center animate-fade-in">
                    <div className="flex justify-center mb-4"><IconBookOpen className="text-blue-600 w-16 h-16" /></div>
                    <h1 className="text-3xl font-bold text-gray-800 mb-2">基本情報 過去問道場 Clone</h1>
                    <p className="text-gray-600 mb-8">本番さながらの4択問題を解いて、弱点を克服しましょう。</p>

                    <div className="space-y-4">
                        <button onClick={() => startQuiz('all')} className="w-full sm:w-3/4 mx-auto flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-xl transition shadow-md">
                            <IconPlay className="w-5 h-5" /> 全問テストを開始する ({ALL_QUESTIONS.length}問)
                        </button>

                        <button onClick={() => startQuiz('review')} disabled={wrongIds.length === 0} className={`w-full sm:w-3/4 mx-auto flex items-center justify-center gap-2 font-bold py-4 px-8 rounded-xl transition shadow-md ${wrongIds.length > 0 ? "bg-red-50 hover:bg-red-100 text-red-600 border border-red-200" : "bg-gray-100 text-gray-400 cursor-not-allowed"}`}>
                            <IconRotateCcw className="w-5 h-5" /> 間違えた問題を復習する ({wrongIds.length}問)
                        </button>
                        
                        {wrongIds.length > 0 && (
                            <button onClick={() => { if(window.confirm('記録をリセットしますか？')) setWrongIds([]); }} className="text-sm text-gray-400 hover:text-gray-600 underline mt-4 block mx-auto">
                                復習リストをリセット
                            </button>
                        )}
                    </div>
                </div>
            );

            const QuizView = () => (
                <div className="max-w-3xl mx-auto mt-6 p-4 sm:p-6 bg-white rounded-2xl shadow-lg animate-fade-in">
                    <div className="flex justify-between items-center mb-6 border-b pb-4">
                        <span className="text-sm font-bold text-gray-500 bg-gray-100 px-3 py-1 rounded-full">{playMode === 'review' ? '復習モード' : '通常テスト'}</span>
                        <span className="text-lg font-bold text-gray-700">問題 {currentIndex + 1} <span className="text-gray-400 text-sm">/ {activeQuestions.length}</span></span>
                    </div>

                    <div className="mb-8">
                        <div className="inline-block bg-blue-100 text-blue-800 text-xs font-bold px-2 py-1 rounded mb-3">{currentQuestion.category}</div>
                        <h2 className="text-xl font-medium text-gray-800 leading-relaxed">{currentQuestion.text}</h2>
                    </div>

                    <div className="space-y-3 mb-8">
                        {currentQuestion.options.map((option, idx) => {
                            let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all flex items-center gap-3 ";
                            let icon = null;
                            if (!isAnswered) {
                                btnClass += selectedOption === idx ? "border-blue-500 bg-blue-50" : "border-gray-200 hover:border-blue-300 hover:bg-gray-50";
                            } else {
                                if (idx === currentQuestion.answerIndex) { btnClass += "border-green-500 bg-green-50"; icon = <IconCheckCircle className="text-green-500 w-6 h-6 flex-shrink-0" />; }
                                else if (idx === selectedOption) { btnClass += "border-red-500 bg-red-50"; icon = <IconXCircle className="text-red-500 w-6 h-6 flex-shrink-0" />; }
                                else { btnClass += "border-gray-200 opacity-50"; }
                            }
                            return (
                                <button key={idx} onClick={() => !isAnswered && setSelectedOption(idx)} className={btnClass}>
                                    <span className={`w-8 h-8 flex items-center justify-center rounded-full font-bold text-sm flex-shrink-0 ${isAnswered && idx === currentQuestion.answerIndex ? 'bg-green-500 text-white' : isAnswered && idx === selectedOption ? 'bg-red-500 text-white' : selectedOption === idx ? 'bg-blue-500 text-white' : 'bg-gray-200 text-gray-600'}`}>
                                        {String.fromCharCode(12450 + idx)}
                                    </span>
                                    <span className="text-gray-700 flex-grow font-medium leading-relaxed">{option}</span>
                                    {icon}
                                </button>
                            );
                        })}
                    </div>

                    {!isAnswered ? (
                        <button onClick={submitAnswer} disabled={selectedOption === null} className={`w-full py-4 rounded-xl font-bold text-lg transition ${selectedOption !== null ? 'bg-blue-600 hover:bg-blue-700 text-white shadow-md' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>解答する</button>
                    ) : (
                        <div className="animate-fade-in-up">
                            <div className={`p-4 rounded-t-xl flex items-center gap-2 font-bold text-lg ${selectedOption === currentQuestion.answerIndex ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                                {selectedOption === currentQuestion.answerIndex ? <><IconCheckCircle className="w-6 h-6"/> 正解！</> : <><IconXCircle className="w-6 h-6"/> 不正解...</>}
                            </div>
                            <div className="bg-gray-50 border-x border-b border-gray-200 rounded-b-xl p-6 mb-6">
                                <h3 className="flex items-center gap-2 font-bold text-gray-700 mb-2"><IconAlertCircle className="w-5 h-5 text-blue-500" /> 解説</h3>
                                <p className="text-gray-700 leading-relaxed">{currentQuestion.explanation}</p>
                            </div>
                            <button onClick={nextQuestion} className="w-full py-4 bg-gray-800 hover:bg-gray-900 text-white rounded-xl font-bold text-lg transition shadow-md flex items-center justify-center gap-2">
                                {currentIndex < activeQuestions.length - 1 ? '次の問題へ' : '結果を見る'} <IconArrowRight className="w-5 h-5" />
                            </button>
                        </div>
                    )}
                </div>
            );

            const ResultView = () => {
                const accuracy = Math.round((correctCount / activeQuestions.length) * 100);
                return (
                    <div className="max-w-2xl mx-auto mt-10 p-8 bg-white rounded-2xl shadow-lg text-center animate-fade-in">
                        <IconAward className={`w-20 h-20 mx-auto mb-4 ${accuracy >= 60 ? 'text-yellow-400' : 'text-gray-400'}`} />
                        <h2 className="text-3xl font-bold text-gray-800 mb-2">学習結果</h2>
                        <div className="flex justify-center items-center gap-8 my-8">
                            <div><p className="text-sm text-gray-500 font-bold mb-1">正解数</p><p className="text-4xl font-black text-gray-800">{correctCount} <span className="text-xl text-gray-500">/ {activeQuestions.length}</span></p></div>
                            <div className="h-16 w-px bg-gray-200"></div>
                            <div><p className="text-sm text-gray-500 font-bold mb-1">正答率</p><p className={`text-4xl font-black ${accuracy >= 60 ? 'text-green-500' : 'text-red-500'}`}>{accuracy}<span className="text-xl">%</span></p></div>
                        </div>
                        <div className="space-y-4">
                            {wrongIds.length > 0 && (
                                <button onClick={() => startQuiz('review')} className="w-full flex items-center justify-center gap-2 bg-red-50 hover:bg-red-100 text-red-600 font-bold py-4 px-8 rounded-xl transition border border-red-200">
                                    <IconRotateCcw className="w-5 h-5" /> 間違えた問題 ({wrongIds.length}問) を復習する
                                </button>
                            )}
                            <button onClick={() => setAppState('home')} className="w-full flex items-center justify-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-4 px-8 rounded-xl transition">
                                <IconHome className="w-5 h-5" /> ホームに戻る
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <div>
                    {appState === 'home' && <HomeView />}
                    {appState === 'playing' && activeQuestions.length > 0 && <QuizView />}
                    {appState === 'result' && <ResultView />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
